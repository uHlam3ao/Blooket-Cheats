name: Check Code Format

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify files exist
      run: |
        echo "Checking repository structure..."
        ls -la
        echo "All script files successfully detected!"
